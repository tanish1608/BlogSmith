[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["frontend", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W"]
# E501: long lines tolerated in prompt text / URLs.
# B008: FastAPI's Depends() in argument defaults is the idiomatic pattern.
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
