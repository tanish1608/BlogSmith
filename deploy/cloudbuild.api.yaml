# Build + deploy the always-on API service (FastAPI + dashboard).
#   gcloud builds submit --config deploy/cloudbuild.api.yaml \
#       --substitutions=_REGION=us-central1
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE}", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - blogsmith-api
      - --image=${_IMAGE}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=APP_ENV=prod,DISPATCH_TO_CLOUD_RUN=true
      - --set-secrets=KEY_ENCRYPTION_KEY=blogsmith-enc-key:latest,SCHEDULER_SECRET=blogsmith-scheduler-secret:latest
substitutions:
  _REGION: us-central1
  _IMAGE: gcr.io/${PROJECT_ID}/blogsmith-api
images:
  - ${_IMAGE}
